# .github/workflows/deploy.yml
name: Deploy to GitHub Pages

on:
    push:
        branches: ["main"] # Указываем основную ветку

    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: "pages"
    cancel-in-progress: true

jobs:
    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: "npm"
            - name: Create .env file
              run: |
                touch .env 
                echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env
                echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env
                echo "✅ .env file created"
                echo "Contents (masked):"
                cat .env | sed 's/=.*/=***/g'  # показать содержимое (значения будут скрыты в логах)

            - name: Verify .env file
              run: |
                echo "📄 .env file exists:"
                ls -la .env
                echo "📄 .env file size:"
                wc -c .env

            - name: Install dependencies
              run: npm ci
            - name: Build
              run: npm run build
            - name: List build output
              run: 
                echo "📁 dist contents:"
                ls -la dist/
                echo "🔍 Looking for env vars in built files:"
                grep -l "VITE_SUPABASE" dist/assets/*.js || echo "No env vars found in JS files"
            - name: Upload artifact
              uses: actions/upload-pages-artifact@v4
              with:
                  path: "./dist" # Указываем папку со сборкой
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
